role: Sports Science & Exercise Physiology
bio: |
    I am a sports scientist interested in exercise physiology, 
    human performance, and the bioenergetics of exercise. My 
    research focuses on lactate dynamics, glycolytic metabolism, 
    and concepts of performance limitation across sprint and endurance 
    contexts. To investigate these topics, I use approaches such as 
    cardiopulmonary exercise testing, lactate profiling, and near-infrared 
    spectroscopy. I am also interested in sex differences, body 
    composition and scaling, as well as  the use of 
    AI tools in research and sport education.

